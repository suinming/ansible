---
- hosts: localhost
  become: yes
  vars:
    user: "suinming"
    home_dir: "/home/suinming"
    dotfiles_repo: "git@github.com:suinming/dotfiles.git"
    ssh_key: "/home/suinming/.ssh/id_ed25519"

  tasks:
    - name: Install updates (Ubuntu)
      tags: always
      apt:
        upgrade: dist
        update_cache: yes

    - name: Install system packages
      apt:
        name:
          - git
          - bat
          - zsh
          - tmux
          - ripgrep
          - fzf
          - eza
          - ninja-build
          - gettext
          - cmake
          - unzip
          - curl
          - python3
          - python3-pip
          - i3
          - i3blocks
        state: latest

    - name: Pull dotfiles from GitHub repository
      git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ home_dir }}/dotfiles"
        accept_hostkey: yes
        key_file: "{{ ssh_key }}"
        force: yes
      delegate_to: localhost
      run_once: true
      become: no
      tags: 
        - git

    - name: Setup .gitconfig
      copy:
        src: "{{ home_dir }}/dotfiles/.gitconfig"
        dest: "{{ home_dir }}"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: 0644
      tags:
        - git

    - name: Setup .gitmessage
      copy:
        src: "{{ home_dir }}/dotfiles/.gitmessage"
        dest: "{{ home_dir }}"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: 0644
      tags:
        - git
