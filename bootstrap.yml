---
- hosts: localhost
  become: yes
  vars:
    user: suinming
    dotfiles_repo: git@github.com:suinming/dotfiles.git
    ssh_key: .ssh/id_ed25519
    space_mono_nerd_font_link: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/SpaceMono.zip

  tasks:
    - name: Create user
      user:
        name: "{{ user }}"
        groups: root

    - name: Generate SSH key
      user:
        name: "{{ user }}"
        generate_ssh_key: yes
        ssh_key_type: ed25519
        ssh_key_file: "{{ ssh_key }}"
        force: no

    - name: Install updates (Ubuntu)
      tags: always
      apt:
        upgrade: dist
        update_cache: yes

    - name: Install system packages
      apt:
        name:
          - git
          - bat
          - exa
          - zsh
          - tmux
          - ripgrep
          - fzf
          - ninja-build
          - gettext
          - cmake
          - unzip
          - curl
          - python3
          - python3-pip
          - i3
          - i3blocks
        state: latest

    - name: Pull dotfiles from GitHub repository
      git:
        repo: "{{ dotfiles_repo }}"
        dest: ./dotfiles
        accept_hostkey: yes
        key_file: "/home/{{ user }}/{{ ssh_key }}"
        force: yes
      delegate_to: localhost
      run_once: true
      become: no

    - name: Display final instructions
      debug:
        msg: |
          The setup is complete! Here are the next steps:
          1. Add the ssh public key to github repo. 
          2. Run the dev_* script to finish the setup. 
