---
- hosts: localhost
  become: yes
  vars:
    user: suinming
    dotfiles_repo: git@github.com:suinming/dotfiles.git
    ssh_key: .ssh/id_ed25519
    space_mono_nerd_font_link: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/SpaceMono.zip

  tasks:
    - name: Install updates (Ubuntu)
      tags: always
      apt:
        upgrade: dist
        update_cache: yes

    - name: Install system packages
      apt:
        name:
          - git
          - bat
          - zsh
          - tmux
          - ripgrep
          - fzf
          - eza
          - ninja-build
          - gettext
          - cmake
          - unzip
          - curl
          - python3
          - python3-pip
          - i3
          - i3blocks
        state: latest

    - name: Pull dotfiles from GitHub repository
      git:
        repo: "{{ dotfiles_repo }}"
        dest: /home/{{ user }}/dotfiles
        accept_hostkey: yes
        key_file: "/home/{{ user }}/{{ ssh_key }}"
        force: yes
      delegate_to: localhost
      run_once: true
      become: no
      tags: 
        - git

    - name: Setup .gitconfig
      copy:
        src: "/home/{{ user }}/dotfiles/.gitconfig"
        dest: "/home/{{ user }}"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: 0644
      tags:
        - git

    - name: Setup .gitmessage
      copy:
        src: "/home/{{ user }}/dotfiles/.gitmessage"
        dest: "/home/{{ user }}"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: 0644
      tags:
        - git
